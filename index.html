  el("cbCreate").addEventListener("click",()=>{
    if(commonPending.length===0){ toast("共用部を選んでください"); return; }
    const noFloor=el("cbNoFloor").checked;
    let s=parseInt(el("cbStart").value,10), e=parseInt(el("cbEnd").value,10);
    if(e<s){ const t=s;s=e;e=t; }

    const makeOne=(floor,name)=>{ db.locations.push({id:uid(),floor,name,kind:"common",status:"todo",photos:[],updatedAt:Date.now()}); n++; };

    else{ for(let f=s;f<=e;f++) commonPending.forEach(name=>makeOne(f+"F",name)); }
    save(); commonPending=[];
    el("cbChips").querySelectorAll(".chip.on").forEach(c=>c.classList.remove("on"));
    renderPending(); updateCbPreview(); renderStructure();

  });

  // 共用部を1つずつ登録（フロア手入力＋名前で1件ずつ）
  const csCreate=()=>{
    const name=(el("csName").value||"").trim();
    if(!name){ toast("名前を入力してください"); return; }
    const fl=(el("csFloor").value||"").trim();
    db.locations.push({id:uid(),floor:fl,name,kind:"common",status:"todo",photos:[],updatedAt:Date.now()});
    save(); el("csName").value=""; el("csName").focus(); renderStructure();
    toast(`「${name}」を作成しました`);
  };
  el("csCreate").addEventListener("click",csCreate);
  el("csName").addEventListener("keydown",e=>{ if(e.key==="Enter") csCreate(); });

  // オプション変更をまとめて記入
  const optTgtBox=el("optTargets");
  if(optTgtBox){
    renderTargets(optTgtBox, null, {unitsOnly:true});
    const optCard=optTgtBox.closest("details");
    if(optCard) optCard.addEventListener("toggle",()=>{ if(optCard.open) renderTargets(optTgtBox, null, {unitsOnly:true}); });
    const applyBtn=el("optBulkApply");
    if(applyBtn) applyBtn.addEventListener("click",()=>{
      const text=(el("optBulkText").value||"").trim();
      if(!text){ toast("オプションの内容を入力してください"); return; }
      const ids=getSelectedTargets(optTgtBox, null);
      const targets=db.locations.filter(l=>ids.includes(l.id) && l.kind==="unit");
      if(targets.length===0){ toast("対象の住戸を選んでください"); return; }
      let cnt=0;
      targets.forEach(l=>{
        const cur=(l.optionMemo||"").replace(/\s+$/,"");
        const lines=cur.split("\n").map(s=>s.trim());
        if(lines.includes(text)) return; // 同じ内容は重複させない
        l.optionMemo = cur ? (cur + "\n" + text) : text;
        l.updatedAt=Date.now(); cnt++;
      });
      save();
      el("optBulkText").value="";
      renderTargets(optTgtBox, null, {unitsOnly:true});
      renderStructure();
      toast(cnt>0 ? `${cnt}戸のオプション変更メモに記入しました` : "選んだ部屋には既に同じ内容がありました");
    });
  }

  renderStructure();

function renderPending(){
  const box=el("cbPending"); if(!box) return;
  box.innerHTML=commonPending.map((c,i)=>`<span class="pending-tag">${escapeHtml(c)}<button data-i="${i}">×</button></span>`).join("");
  box.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    const name=commonPending[parseInt(b.dataset.i,10)];
    commonPending=commonPending.filter(x=>x!==name);
    const chips=el("cbChips");
    const chip=chips&&Array.from(chips.querySelectorAll(".chip")).find(c=>c.dataset.c===name);
    if(chip) chip.classList.remove("on");
    renderPending();
  }));
}

function resetProcessesToDefault(){
  // 既存工程を「読み替え後の名前」で引けるようにする（同名は最初の1つを優先）
  const byName={};
  (db.processes||[]).forEach(p=>{ const k=PROC_RENAMES[p.name]||p.name; if(!(k in byName)) byName[k]=p; });
  // 既定の分類が無ければ用意する
  if(!Array.isArray(db.categories)) db.categories=[];
  DEFAULT_CATEGORIES.forEach(dc=>{ if(!db.categories.some(c=>c.id===dc.id)) db.categories.push({id:dc.id,name:dc.name}); });
  // 既定の並び・分類で工程を作り直す。同名（読み替え含む）は既存idを引き継ぎ進捗を温存
  const newProcs=DEFAULT_PROCESSES.map(dp=>{
    const ex=byName[dp.name];
    return ex ? {id:ex.id,name:dp.name,catId:dp.cat} : {id:uid(),name:dp.name,catId:dp.cat};
  });
  const keep=new Set(newProcs.map(p=>p.id));
  db.processes=newProcs;
  // 既定に無い工程に紐づく進捗・注意点を整理（住戸のみ。共用部は別管理なので触らない）
  const keepCommon=new Set((db.commonProcesses||[]).map(p=>p.id));
  db.locations.forEach(l=>{
    if(l.kind==="common") return;
    if(l.progress) Object.keys(l.progress).forEach(pid=>{ if(!keep.has(pid)) delete l.progress[pid]; });
  });
  db.notes.forEach(n=>{ if(n.processId && !keep.has(n.processId) && !keepCommon.has(n.processId)) n.processId=null; });
  save();
}

function renderProcessList(){
  const box=el("procEditList"); if(!box) return;
  const cats=catList();
  const ps=db.processes||[];
  if(ps.length===0){ box.innerHTML=`<div class="empty">工程がありません。下から追加してください</div>`; return; }
  box.innerHTML="";
  const moveProc=(p,dir)=>{
    const same=db.processes.filter(x=>x.catId===p.catId);
    const i=same.indexOf(p), j=i+dir;
    if(j<0||j>=same.length) return;
    const a=db.processes, ia=a.indexOf(same[i]), ib=a.indexOf(same[j]);
    const t=a[ia]; a[ia]=a[ib]; a[ib]=t; save(); renderProcessList();
  };
  const otherCat=(p)=>{
    if(cats.length<2) return null;
    const idx=cats.findIndex(c=>c.id===p.catId);
    return cats[(idx+1)%cats.length];
  };
  cats.forEach(c=>{
    const head=document.createElement("div"); head.className="proc-cat-head"; head.textContent=c.name;
    box.appendChild(head);
    const list=db.processes.filter(x=>x.catId===c.id);
    if(list.length===0){
      const e=document.createElement("div"); e.className="proc-cat-empty"; e.textContent="（この分類の工程はまだありません）";
      box.appendChild(e); return;
    }
    list.forEach((p,idx)=>{
      const row=document.createElement("div"); row.className="proc-edit";
      const oc=otherCat(p);
      const moveBtn = oc ? `<button class="pe-move">↔${escapeHtml(oc.name)}</button>` : "";
      row.innerHTML=`
        <button class="pe-name">${escapeHtml(p.name)}</button>
        ${moveBtn}
        <button class="pe-up" ${idx===0?"disabled":""}>▲</button>
        <button class="pe-down" ${idx===list.length-1?"disabled":""}>▼</button>
        <button class="pe-del">削除</button>`;
      row.querySelector(".pe-name").addEventListener("click",()=>{
        uiPrompt("工程名を編集",p.name).then(nn=>{ if(nn!==null&&nn.trim()){ p.name=nn.trim(); save(); renderProcessList(); } });
      });
      const mb=row.querySelector(".pe-move");
      if(mb) mb.addEventListener("click",()=>{ const o=otherCat(p); if(o){ p.catId=o.id; save(); renderProcessList(); } });
      row.querySelector(".pe-up").addEventListener("click",()=>moveProc(p,-1));
      row.querySelector(".pe-down").addEventListener("click",()=>moveProc(p,1));
      row.querySelector(".pe-del").addEventListener("click",()=>{
        uiConfirm(`工程「${p.name}」を削除しますか？`).then(ok=>{ if(ok){ db.processes=db.processes.filter(x=>x.id!==p.id); save(); renderProcessList(); } });
      });
      box.appendChild(row);
    });
  });
}

function renderStructure(){
  const box=el("structBox"); if(!box) return;
  const {order,groups,commons}=grouped();
  if(order.length===0&&commons.length===0){ box.innerHTML=`<div class="empty">まだ登録がありません</div>`; return; }
  box.innerHTML="";
  const moveFloor=(floor,dir)=>{
    let fo=order.slice();               // 現在の表示順から作り直して入れ替え
    const i=fo.indexOf(floor), j=i+dir;
    if(i<0||j<0||j>=fo.length) return;
    const t=fo[i]; fo[i]=fo[j]; fo[j]=t;
    db.ui=db.ui||{}; db.ui.floorOrder=fo;
    save(); renderStructure();
  };
  const mkGroup=(label,locs,isCommon,idx,total)=>{
    const unitWord=isCommon?"件":"戸";
    const d=document.createElement("details"); d.className="struct-fg"+(isCommon?" common":"");
    const key=(isCommon?"c:":"u:")+label;
    d.open=structOpen.has(key);
    d.addEventListener("toggle",()=>{ if(d.open) structOpen.add(key); else structOpen.delete(key); });
    const sum=document.createElement("summary");
    const moveBtns = isCommon ? "" :
      `<button type="button" class="sf-move sf-up" ${idx===0?"disabled":""} aria-label="上へ">▲</button>`+
      `<button type="button" class="sf-move sf-down" ${idx===total-1?"disabled":""} aria-label="下へ">▼</button>`;
    sum.innerHTML=`<span class="sf-tw">›</span><span class="sf-name"${isCommon?' style="color:var(--common)"':''}>${escapeHtml(label)}</span><span class="sf-count">${locs.length}${unitWord}</span>${moveBtns}<button type="button" class="sf-del">削除</button>`;
    if(!isCommon){
      sum.querySelector(".sf-up").addEventListener("click",e=>{ e.preventDefault(); e.stopPropagation(); moveFloor(label,-1); });
      sum.querySelector(".sf-down").addEventListener("click",e=>{ e.preventDefault(); e.stopPropagation(); moveFloor(label,1); });
    }
    sum.querySelector(".sf-del").addEventListener("click",e=>{
      e.preventDefault(); e.stopPropagation();
      uiConfirm(`「${label}」の ${locs.length}${unitWord}をすべて削除しますか？`).then(ok=>{
        if(!ok) return;
        const ids=locs.map(l=>l.id);
        db.locations=db.locations.filter(l=>!ids.includes(l.id));
        pruneNotes(ids); save(); renderStructure();
      });
    });
    d.appendChild(sum);
    const rooms=document.createElement("div"); rooms.className="sf-rooms";
    locs.forEach(l=>{
      const r=document.createElement("div"); r.className="sf-room";
      let badge="", extraBtn="";
      if(isCommon){
        if(l.floor) badge=`<span class="type-badge">${escapeHtml(l.floor)}</span>`;
        extraBtn=`<button type="button" class="sf-floor">フロア</button>`;
      }else{
        if(l.type) badge=`<span class="type-badge">${escapeHtml(l.type)}</span>`;
        extraBtn=`<button type="button" class="sf-type">タイプ</button>`;
      }
      r.innerHTML=`<button type="button" class="sf-rename">${escapeHtml(l.name)}${badge}</button>${extraBtn}<button type="button" class="sf-rdel">×</button>`;
      r.querySelector(".sf-rename").addEventListener("click",()=>{
        uiPrompt(isCommon?"名称を編集":"部屋番号を編集",l.name).then(nn=>{
          if(nn!==null&&nn.trim()){ l.name=nn.trim(); l.updatedAt=Date.now(); save(); renderStructure(); }
        });
      });
      const tb=r.querySelector(".sf-type");
      if(tb) tb.addEventListener("click",()=>{
        uiPrompt("タイプ名を入力（例：A）。空欄で消去できます",l.type||"").then(t=>{
          if(t!==null){ l.type=t.trim(); l.updatedAt=Date.now(); save(); renderStructure(); }
        });
      });
      const fb=r.querySelector(".sf-floor");
      if(fb) fb.addEventListener("click",()=>{
        uiPrompt("フロアを入力（例：3F、屋上）。空欄で「階未設定」",l.floor||"").then(f=>{
          if(f!==null){ l.floor=f.trim(); l.updatedAt=Date.now(); save(); renderStructure(); }
        });
      });
      r.querySelector(".sf-rdel").addEventListener("click",()=>{
        uiConfirm(`「${l.name}」を削除しますか？`).then(ok=>{
          if(!ok) return;
          db.locations=db.locations.filter(x=>x.id!==l.id);
          pruneNotes([l.id]); save(); renderStructure();
        });
      });
      rooms.appendChild(r);
    });
    d.appendChild(rooms);
    return d;
  };
  // 共用部：フロア▲▼（フロア並べ替え）と各行▲▼（同フロア内の個別並べ替え）
  const moveCommonFloor=(f,dir)=>{
    const cs=db.locations.filter(l=>l.kind==="common");
    let co=commonFloorGroups(cs).order.slice();
    const i=co.indexOf(f), j=i+dir;
    if(i<0||j<0||j>=co.length) return;
    const t=co[i]; co[i]=co[j]; co[j]=t;
    db.ui=db.ui||{}; db.ui.commonFloorOrder=co;
    save(); renderStructure();
  };
  const moveCommonItem=(l,locs,dir)=>{
    const i=locs.indexOf(l), j=i+dir;
    if(i<0||j<0||j>=locs.length) return;
    const a=db.locations, ia=a.indexOf(locs[i]), ib=a.indexOf(locs[j]);
    const t=a[ia]; a[ia]=a[ib]; a[ib]=t;
    save(); renderStructure();
  };
  const mkCommonGroup=(f,locs,idx,total)=>{
    const label=f||"階未設定";
    const d=document.createElement("details"); d.className="struct-fg common";
    const key="c:"+f;
    d.open=structOpen.has(key);
    d.addEventListener("toggle",()=>{ if(d.open) structOpen.add(key); else structOpen.delete(key); });
    const sum=document.createElement("summary");
    const moveBtns=
      `<button type="button" class="sf-move sf-up" ${idx===0?"disabled":""} aria-label="上へ">▲</button>`+
      `<button type="button" class="sf-move sf-down" ${idx===total-1?"disabled":""} aria-label="下へ">▼</button>`;
    sum.innerHTML=`<span class="sf-tw">›</span><span class="sf-name" style="color:var(--common)">共用 ${escapeHtml(label)}</span><span class="sf-count">${locs.length}件</span>${moveBtns}<button type="button" class="sf-del">削除</button>`;
    sum.querySelector(".sf-up").addEventListener("click",e=>{ e.preventDefault(); e.stopPropagation(); moveCommonFloor(f,-1); });
    sum.querySelector(".sf-down").addEventListener("click",e=>{ e.preventDefault(); e.stopPropagation(); moveCommonFloor(f,1); });
    sum.querySelector(".sf-del").addEventListener("click",e=>{
      e.preventDefault(); e.stopPropagation();
      uiConfirm(`「共用 ${label}」の ${locs.length}件をすべて削除しますか？`).then(ok=>{
        if(!ok) return;
        const ids=locs.map(l=>l.id);
        db.locations=db.locations.filter(l=>!ids.includes(l.id));
        pruneNotes(ids); save(); renderStructure();
      });
    });
    d.appendChild(sum);
    const rooms=document.createElement("div"); rooms.className="sf-rooms";
    locs.forEach((l,ridx)=>{
      const r=document.createElement("div"); r.className="sf-room";
      const badge = l.floor ? `<span class="type-badge">${escapeHtml(l.floor)}</span>` : "";
      r.innerHTML=`<button type="button" class="sf-rename">${escapeHtml(l.name)}${badge}</button>`+
        `<button type="button" class="sf-move sf-rup" ${ridx===0?"disabled":""} aria-label="上へ">▲</button>`+
        `<button type="button" class="sf-move sf-rdown" ${ridx===locs.length-1?"disabled":""} aria-label="下へ">▼</button>`+
        `<button type="button" class="sf-floor">フロア</button>`+
        `<button type="button" class="sf-rdel">×</button>`;
      r.querySelector(".sf-rename").addEventListener("click",()=>{
        uiPrompt("名称を編集",l.name).then(nn=>{ if(nn!==null&&nn.trim()){ l.name=nn.trim(); l.updatedAt=Date.now(); save(); renderStructure(); } });
      });
      r.querySelector(".sf-floor").addEventListener("click",()=>{
        uiPrompt("フロアを入力（例：3F、屋上）。空欄で「階未設定」",l.floor||"").then(nf=>{ if(nf!==null){ l.floor=nf.trim(); l.updatedAt=Date.now(); save(); renderStructure(); } });
      });
      r.querySelector(".sf-rup").addEventListener("click",()=>moveCommonItem(l,locs,-1));
      r.querySelector(".sf-rdown").addEventListener("click",()=>moveCommonItem(l,locs,1));
      r.querySelector(".sf-rdel").addEventListener("click",()=>{
        uiConfirm(`「${l.name}」を削除しますか？`).then(ok=>{ if(!ok) return; db.locations=db.locations.filter(x=>x.id!==l.id); pruneNotes([l.id]); save(); renderStructure(); });
      });
      rooms.appendChild(r);
    });
    d.appendChild(rooms);
    return d;
  };

  order.forEach((floor,idx)=> box.appendChild(mkGroup(floor,groups[floor],false,idx,order.length)) );
  if(commons.length){
    const cg=commonFloorGroups(commons);
    cg.order.forEach((f,idx)=> box.appendChild(mkCommonGroup(f,cg.groups[f],idx,cg.order.length)) );
  }
}

/* =========================================================
   ターゲット選択（部屋/フロアのチェックツリー）
   ========================================================= */
function renderTargets(container, lockedId, opts){
  opts=opts||{};
  const {order,groups,commons}=grouped();
  container.innerHTML="";
  const mk=(label,locs,isCommon)=>{
    const wrap=document.createElement("div"); wrap.className="tgt-floor";
    wrap.innerHTML=`<label class="tgt-head"><input type="checkbox" class="tgt-all"><b>${escapeHtml(label)}</b><span>全室</span></label><div class="tgt-rooms"></div>`;
    const rb=wrap.querySelector(".tgt-rooms");
    locs.forEach(l=>{
      const lock = l.id===lockedId;
      const cb=document.createElement("label"); cb.className="tgt-room";
      cb.innerHTML=`<input type="checkbox" class="tgt-cb" data-kind="${isCommon?"common":"unit"}" value="${l.id}" ${lock?"checked disabled":""}> ${escapeHtml(l.name)}`;
      rb.appendChild(cb);
    });
    wrap.querySelector(".tgt-all").addEventListener("change",e=>{
      rb.querySelectorAll(".tgt-cb:not([disabled])").forEach(cb=>cb.checked=e.target.checked);
    });
    container.appendChild(wrap);
  };
  order.forEach(f=>mk(f,groups[f],false));
  if(commons.length && !opts.unitsOnly){
    const cg=commonFloorGroups(commons);
    if(cg.order.length>1) cg.order.forEach(f=>mk("共用 "+(f||"階未設定"), cg.groups[f], true));
    else mk("共用部",commons,true);
  }
}
function getSelectedTargets(container, lockedId){
  const ids=new Set();
  if(lockedId) ids.add(lockedId);
  container.querySelectorAll(".tgt-cb:checked").forEach(cb=>ids.add(cb.value));
  return [...ids];
}

function openNoteModal(){
  notePhotosBuffer=[]; el("inNote").value="";
  // 工程セレクト（今の部屋の種別に合わせる）
  const curLoc=db.locations.find(l=>l.id===currentLocId);
  const sel=el("inNoteProc");
  sel.innerHTML=`<option value="">（工程に紐づけない）</option>`+procListFor(curLoc).map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join("");
  sel.value="";
  // 適用範囲（今の部屋は固定で選択）
  renderTargets(el("noteTargets"), currentLocId);
  // 工程を選んだら、その工程が無い種別の部屋は選べないようにする（整合）
  const curKind = (curLoc && curLoc.kind==="common") ? "common" : "unit";
  const otherKind = curKind==="common" ? "unit" : "common";
  const applyNoteProcFilter=()=>{
    const tied=!!sel.value;
    el("noteTargets").querySelectorAll('.tgt-cb[data-kind="'+otherKind+'"]').forEach(cb=>{
      const row=cb.closest(".tgt-room");
      if(tied){ cb.checked=false; cb.disabled=true; if(row) row.style.opacity=".4"; }
      else if(cb.value!==currentLocId){ cb.disabled=false; if(row) row.style.opacity=""; }
    });
    const hint=el("noteTgtHint");
    if(hint){
      if(tied){ hint.style.display=""; hint.textContent="工程に紐づけたため、"+(curKind==="common"?"共用部":"住戸")+"のみ選べます（もう一方は別の工程セットです）"; }
      else{ hint.style.display="none"; hint.textContent=""; }
    }
  };
  sel.onchange=applyNoteProcFilter;
  applyNoteProcFilter();
  // 同じタイプ（住戸）／同じ名前（共用部）をまとめて選択
  const sameBtn=el("noteSameType");
  if(sameBtn){
    const key = curKind==="common" ? (curLoc.name||"") : ((curLoc&&curLoc.type)||"");
    if(key){
      sameBtn.style.display="";
      const selLabel = curKind==="common" ? `「${key}」をまとめて選択` : `タイプ${key} をまとめて選択`;
      const offLabel = curKind==="common" ? `「${key}」の選択を解除` : `タイプ${key} の選択を解除`;
      const setMatched=(on)=>{
        el("noteTargets").querySelectorAll('.tgt-cb[data-kind="'+curKind+'"]:not([disabled])').forEach(cb=>{
          const loc=db.locations.find(l=>l.id===cb.value);
          const k = loc ? (curKind==="common" ? (loc.name||"") : (loc.type||"")) : "";
          if(k===key) cb.checked=on;
        });
      };
      let picked=false;
      sameBtn.textContent=selLabel;
      sameBtn.style.background=""; sameBtn.style.color="";
      sameBtn.onclick=()=>{
        picked=!picked;
        setMatched(picked);
        sameBtn.textContent = picked ? offLabel : selLabel;
        sameBtn.style.background = picked ? "#e8f0fe" : "";
        sameBtn.style.color = picked ? "var(--accent)" : "";
      };
    } else { sameBtn.style.display="none"; sameBtn.onclick=null; }
  }
  refreshNotePhotoGrid(); el("noteModal").classList.add("active");
}
function closeNoteModal(){ el("noteModal").classList.remove("active"); }

  renderPhotoGrid(el("notePhotoGrid"),notePhotosBuffer,{

}

function compressImage(file,maxSize,quality){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h&&w>maxSize){ h=Math.round(h*maxSize/w); w=maxSize; }
        else if(h>=w&&h>maxSize){ w=Math.round(w*maxSize/h); h=maxSize; }
        const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg",quality));
      };
      img.onerror=reject; img.src=e.target.result;
    };
    r.onerror=reject; r.readAsDataURL(file);
  });
}

/* =========================================================
   データのバックアップ（書き出し／復元）
   - 本体データ(genba_mansion_v1)を丸ごとファイル化／復元する
   - 共有用キー(genba_share_test_v1)には触れない
   ========================================================= */
const BACKUP_TAG="genba_mansion_backup_v1";

function backupFileName(){
  const d=new Date(), p=n=>String(n).padStart(2,"0");
  return `genba-backup-${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}.json`;
}

async function exportBackup(){
  // 目印・日付つきの包みにする（復元時に正しいファイルか確認するため）
  const envelope={ app:BACKUP_TAG, savedAt:new Date().toISOString(), data:db };
  const text=JSON.stringify(envelope);
  const fname=backupFileName();
  const blob=new Blob([text],{type:"application/json"});

  // スマホ：共有シートでファイルを保存できるなら、それを優先
  try{
    if(navigator.canShare){
      const file=new File([blob],fname,{type:"application/json"});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:"現場データのバックアップ"});
        toast("バックアップを共有しました");
        return;
      }
    }
  }catch(e){ /* キャンセル等はダウンロードへ */ }

  // それ以外：ふつうにダウンロード
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=fname; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast("バックアップを書き出しました");
  }catch(e){ toast("書き出しできませんでした"); }
}

function readFileText(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result);
    r.onerror=reject; r.readAsText(file);
  });
}
function isValidBackupData(o){
  // 最低限、本体データの形をしているか確認
  return !!o && typeof o==="object" && typeof o.site==="object"
    && Array.isArray(o.locations) && Array.isArray(o.notes);
}
async function importBackup(file){
  let text="";
  try{ text=await readFileText(file); }
  catch(e){ toast("ファイルを読み込めませんでした"); return; }

  let parsed;
  try{ parsed=JSON.parse(text); }
  catch(e){ toast("バックアップファイルではないようです"); return; }

  // 包み（envelope）でも、本体データそのままでも受け付ける
  let data=null;
  if(parsed && parsed.app===BACKUP_TAG && parsed.data) data=parsed.data;
  else if(isValidBackupData(parsed)) data=parsed;

  if(!isValidBackupData(data)){ toast("正しいバックアップファイルではありません"); return; }

  const cnt=Array.isArray(data.locations)?data.locations.length:0;
  let when="（日時不明）";
  if(parsed && parsed.savedAt){ try{ when=new Date(parsed.savedAt).toLocaleString(); }catch(e){} }
  const ok=await uiConfirm(
    "このバックアップで復元しますか？\n\n保存日時："+when+"\n部屋の数："+cnt+"件\n\n※今この端末にあるデータは、すべて上書きされます。",
    {okText:"復元する（上書き）"}
  );
  if(!ok) return;

  try{ localStorage.setItem(STORE_KEY,JSON.stringify(data)); }
  catch(e){ toast("復元できませんでした（写真が多すぎる可能性）"); return; }

  // 読み込み直して画面を更新
  load();
  showView("list"); renderList();
  toast("バックアップから復元しました");
}

/* アプリ内の確認・入力ポップアップ（ブラウザのconfirm/promptに依存しない） */
function pickStatus(current,title){
  // タップで 未着手/施工中/完了 を直接選ぶ。キャンセル・枠外タップは null を返す（変更しない）
  return new Promise(resolve=>{
    const opts=[{v:"todo",label:"未着手"},{v:"doing",label:"施工中"},{v:"done",label:"完了"}];
    const ov=document.createElement("div"); ov.className="modal active";
    ov.innerHTML=`<div class="sheet">
      <h3>${escapeHtml(title||"進捗を選ぶ")}</h3>
      <div class="status-pick">${opts.map(o=>
        `<button type="button" class="status-pick-btn ${o.v===current?"cur":""}" data-v="${o.v}"><span class="sp-dot"></span>${o.label}${o.v===current?"<small>現在</small>":""}</button>`
      ).join("")}</div>
      <button type="button" class="btn btn-soft" data-v="__cancel">キャンセル</button>
    </div>`;
    const done=(v)=>{ ov.remove(); resolve(v); };
    ov.addEventListener("click",e=>{
      if(e.target===ov){ done(null); return; }
      const b=e.target.closest&&e.target.closest("[data-v]");
      if(!b) return;
      const v=b.getAttribute("data-v");
      done(v==="__cancel"?null:v);
    });
    document.body.appendChild(ov);
  });
}
function uiConfirm(message,opts){
  opts=opts||{};
  const okText=opts.okText||"削除する";
  const okBg=opts.okStyle==="primary"?"var(--accent)":"var(--danger)";
  return new Promise(resolve=>{
    const ov=document.createElement("div"); ov.className="modal active";
    ov.innerHTML=`<div class="sheet">
      <h3 style="font-weight:700;font-size:15px;white-space:pre-wrap">${escapeHtml(message)}</h3>
      <div class="sheet-actions">
        <button class="btn btn-soft" data-a="no">キャンセル</button>
        <button class="btn btn-primary" data-a="yes" style="background:${okBg}">${escapeHtml(okText)}</button>
      </div></div>`;
    const done=(v)=>{ ov.remove(); resolve(v); };
    ov.addEventListener("click",e=>{
      if(e.target===ov) done(false);
      const a=e.target.getAttribute&&e.target.getAttribute("data-a");
      if(a==="yes") done(true); if(a==="no") done(false);
    });
    document.body.appendChild(ov);
  });
}
function uiPrompt(message,defaultVal){
  return new Promise(resolve=>{
    const ov=document.createElement("div"); ov.className="modal active";
    ov.innerHTML=`<div class="sheet">
      <h3>${escapeHtml(message)}</h3>
      <div class="field"><input id="__promptIn" type="text" value="${escapeHtml(defaultVal||"")}"></div>
      <div class="sheet-actions">
        <button class="btn btn-soft" data-a="no">キャンセル</button>
        <button class="btn btn-primary" data-a="yes">決定</button>
      </div></div>`;
    const done=(v)=>{ ov.remove(); resolve(v); };
    ov.addEventListener("click",e=>{
      if(e.target===ov) done(null);
      const a=e.target.getAttribute&&e.target.getAttribute("data-a");
      if(a==="yes") done(ov.querySelector("#__promptIn").value);
      if(a==="no") done(null);
    });
    document.body.appendChild(ov);
    setTimeout(()=>{ const i=ov.querySelector("#__promptIn"); i.focus(); i.select(); },80);
  });
}

/* =========================================================
   共有：作業リストの書き出し／取り込み（クラウド経由）
   - 本体データ(genba_mansion_v1)には書き込まない
   - 取り込んだリストは別キー(genba_share_test_v1)に保存
   ========================================================= */
let shareCandidates=[]; // {item, sel}
let pendingTaskListData=null; // クラウド送信待ちの作業リストデータ
function shareItemFromLocProc(loc,p){
  const pr=getProg(loc,p.id);
  return {
    lid:loc.id, ln:loc.name,
    fl: loc.kind==="common" ? ("共用"+(loc.floor?" "+loc.floor:"")) : (loc.floor||"階未設定"),
    kind:loc.kind||"unit",
    pid:p.id, pn:p.name, st:pr.status,
    rem:(pr.remaining||[]).map(it=>({t:it.text,d:!!it.done})),
    done:false
  };
}
/* 部屋ごとの付帯情報を共有用に取り出す（写真は枚数だけ＝ダミー）。
   本体データ構造には触れない。情報が無ければ null を返す。 */
function shareRoomInfo(loc){
  if(!loc) return null;
  const info={};
  const om=(loc.optionMemo||"").trim();
  if(om) info.om=om;
  const ns=notesFor(loc).map(n=>{
    const p=n.processId?findProcAny(n.processId):null;
    return { x:n.text, p:p?p.name:"" };
  });
  if(ns.length) info.notes=ns;
  const pc=(loc.photos||[]).length;
  if(pc) info.pc=pc;
  return (info.om||info.notes||info.pc)?info:null;
}
function collectShareCandidates(pid, ids){
  const out=[];
  db.locations.forEach(loc=>{
    if(ids && ids.length && !ids.includes(loc.id)) return; // 部屋未選択なら全部屋
    procListFor(loc).forEach(p=>{
      if(pid && pid!=="__all__" && p.id!==pid) return;
      if(getProg(loc,p.id).status!=="done") out.push({item:shareItemFromLocProc(loc,p),sel:true});
    });
  });
  return out;
}
function refreshShareInfo(){
  const sel=shareCandidates.filter(c=>c.sel).map(c=>c.item);
  const rooms={}, seen=new Set();
  sel.forEach(it=>{
    if(seen.has(it.lid)) return; seen.add(it.lid);
    const info=shareRoomInfo(db.locations.find(l=>l.id===it.lid));
    if(info) rooms[it.lid]=info;
  });
  pendingTaskListData = sel.length ? { t:"list", site:db.site.name||"現場", at:Date.now(), items:sel, rooms } : null;
  el("shareCandInfo").textContent = `選択 ${sel.length} / 未完了 ${shareCandidates.length}件`;
  const sendBtn=el("shareSendBtn");
  if(sendBtn) sendBtn.disabled = !pendingTaskListData;
}
function renderShareCandidates(){
  const box=el("shareCandList");
  if(shareCandidates.length===0){
    box.innerHTML=`<div class="empty">条件に合う未完了がありません。</div>`;
    refreshShareInfo(); return;
  }
  const groups={}, order=[];
  shareCandidates.forEach((c,ix)=>{ const f=c.item.fl||"その他"; if(!groups[f]){groups[f]=[];order.push(f);} groups[f].push({c,ix}); });
  let html="";
  order.forEach(f=>{
    html+=`<div class="floor-head" style="margin:10px 4px 6px">${escapeHtml(f)}</div>`;
    const byRoom={}, ro=[];
    groups[f].forEach(o=>{ const k=o.c.item.lid; if(!byRoom[k]){byRoom[k]=[];ro.push(k);} byRoom[k].push(o); });
    ro.forEach(rk=>{
      html+=`<div style="font-weight:700;font-size:13px;margin:6px 4px 4px">${escapeHtml(byRoom[rk][0].c.item.ln)}</div>`;
      byRoom[rk].forEach(({c,ix})=>{
        html+=`<label class="tgt-room" style="padding:8px"><input type="checkbox" class="shc-cb" data-ix="${ix}" ${c.sel?"checked":""}> ${escapeHtml(c.item.pn)}</label>`;
      });
    });
  });
  box.innerHTML=html;
  box.querySelectorAll(".shc-cb").forEach(cb=>cb.addEventListener("change",()=>{
    const ix=parseInt(cb.dataset.ix,10); if(shareCandidates[ix]) shareCandidates[ix].sel=cb.checked; refreshShareInfo();
  }));
  refreshShareInfo();
}
function loadShareList(){

function renderShareList(){
  const v=el("viewShare");
  const obj=loadShareList();
  const worker=isWorker();
  let html=`<div class="detail-title-row"><div class="detail-title">${worker?"作業員モード":"今日の作業（取り込み）"}</div></div>`;
  if(worker){
    html+=`<button class="btn btn-soft" id="shareWorkerImport" style="width:100%;margin-bottom:12px">📥 作業リストを取り込む</button>`;
  }
  if(!obj||!Array.isArray(obj.items)||obj.items.length===0){
    html+=`<div class="detail-sub">取り込んだ作業リストがありません。</div>
      <div class="empty" style="margin-top:30px">${worker?"上の":"一覧の"}「📥 作業リストを取り込む」から、受け取ったコードを貼り付けてください。</div>`;
    if(worker) html+=workerSwitchHtml();
    v.innerHTML=html; bindWorkerShareControls(); return;
  }
  const total=obj.items.length, done=obj.items.filter(it=>it.done).length;
  const w=new Date(obj.at||Date.now());
  const wt=`${w.getFullYear()}/${w.getMonth()+1}/${w.getDate()} ${String(w.getHours()).padStart(2,"0")}:${String(w.getMinutes()).padStart(2,"0")}`;
  html+=`<div class="detail-sub">${escapeHtml(obj.site||"現場")}　取り込み：${wt}</div>`;
  html+=`<div class="preview">完了 ${done} / ${total}</div>`;
  html+=`<div class="preview" style="background:#fff7e6;color:#92500a">※これは試作です。チェックしても本体アプリの進捗には反映されません。</div>`;
  const rooms=obj.rooms||{};
  const groups={}, order=[];
  obj.items.forEach((it,ix)=>{ const f=it.fl||"その他"; if(!groups[f]){groups[f]=[];order.push(f);} groups[f].push({it,ix}); });
  order.forEach(f=>{
    html+=`<div class="floor-head">${escapeHtml(f)}</div>`;
    const byRoom={}, ro=[];
    groups[f].forEach(o=>{ const k=o.it.lid; if(!byRoom[k]){byRoom[k]=[];ro.push(k);} byRoom[k].push(o); });
    ro.forEach(rk=>{
      const roomName=byRoom[rk][0].it.ln;
      html+=`<div class="card"><div style="padding:12px">`;
      html+=`<div style="font-weight:700;margin-bottom:8px">${escapeHtml(roomName)}</div>`;
      html+=renderShareRoomInfo(rooms[rk]);
      byRoom[rk].forEach(({it,ix})=>{
        html+=`<label class="rem-item ${it.done?"done":""}" style="border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:6px">
          <input type="checkbox" class="sh-cb" data-ix="${ix}" ${it.done?"checked":""}><span>${escapeHtml(it.pn)}</span></label>`;
        if(it.rem&&it.rem.length){
          html+=`<div style="margin:0 0 8px 26px">`;
          it.rem.forEach((r,rix)=>{
            html+=`<label class="rem-item ${r.d?"done":""}" style="padding:6px 2px"><input type="checkbox" class="sh-rcb" data-ix="${ix}" data-rix="${rix}" ${r.d?"checked":""}><span>${escapeHtml(r.t)}</span></label>`;
          });
          html+=`</div>`;
        }
      });
      html+=`</div></div>`;
    });
  });
  html+=`<button class="btn btn-primary" id="shareDoneBtn" style="margin-top:14px">📤 完了を職長に返す</button>`;
  html+=`<button class="btn btn-soft" id="sharePhotoReturnBtn" style="margin-top:8px">📷 写真を返す（準備中）</button>`;
  html+=`<button class="btn-danger-text" id="shareClearBtn" style="margin-top:8px">この取り込みデータを削除</button>`;
  if(worker) html+=workerSwitchHtml();
  v.innerHTML=html;
  const dbn=el("shareDoneBtn");
  if(dbn) dbn.addEventListener("click",openShareDone);
  const pbn=el("sharePhotoReturnBtn");
  if(pbn) pbn.addEventListener("click",()=>toast("写真の受け渡しはフェーズ2（Firebase）で対応予定です"));
  v.querySelectorAll(".sh-cb").forEach(cb=>cb.addEventListener("change",()=>{
    const o=loadShareList(); const ix=parseInt(cb.dataset.ix,10);
    if(o&&o.items[ix]){ o.items[ix].done=cb.checked; saveShareList(o); renderShareList(); }
  }));
  v.querySelectorAll(".sh-rcb").forEach(cb=>cb.addEventListener("change",()=>{
    const o=loadShareList(); const ix=parseInt(cb.dataset.ix,10), rix=parseInt(cb.dataset.rix,10);
    if(o&&o.items[ix]&&o.items[ix].rem[rix]){ o.items[ix].rem[rix].d=cb.checked; saveShareList(o); }
    cb.closest(".rem-item").classList.toggle("done",cb.checked);
  }));
  const clr=el("shareClearBtn");
  if(clr) clr.addEventListener("click",()=>{
    uiConfirm("取り込んだ作業リストを削除しますか？（本体には影響しません）").then(ok=>{
      if(ok){ try{ localStorage.removeItem(SHARE_KEY); }catch(e){} renderShareList(); }
    });
  });
  bindWorkerShareControls();
}

   - 作業員モードは「取り込む／受け取ったリスト／完了を返す」だけのシンプル画面
   ========================================================= */
function getRole(){ try{ return localStorage.getItem(ROLE_KEY)==="worker"?"worker":"foreman"; }catch(e){ return "foreman"; } }
function setRole(r){ try{ localStorage.setItem(ROLE_KEY, r==="worker"?"worker":"foreman"); }catch(e){} }
function isWorker(){ return getRole()==="worker"; }

function workerSwitchHtml(){
  return `<div style="text-align:center;margin-top:24px">
    <button id="toForemanBtn" style="background:none;border:none;color:#8a8a8a;font-size:12px;text-decoration:underline;padding:8px">職長モードに切り替える</button>
  </div>`;
}

    if(!ok) return;
    setRole("foreman"); applyMode(); toast("職長モードに切り替えました");
  });
}
/* 役割に応じて画面を切り替える（起動時・切替時に呼ぶ） */
function applyMode(){
  const w=isWorker();
  document.body.classList.toggle("worker-mode", w);

  else { renderList(); showView("list"); }
}

/* --- 復路（作業員→職長）：完了報告の作成・確認・反映 --- */
function makeDoneCode(){
  const o=loadShareList();
  if(!o||!Array.isArray(o.items)||o.items.length===0) return null;
  const items=o.items.map(it=>({
    lid:it.lid, ln:it.ln, fl:it.fl, pid:it.pid, pn:it.pn,
    done:!!it.done, rem:(it.rem||[]).map(r=>({t:r.t,d:!!r.d}))
  }));
  return { t:"done", site:o.site||"現場", at:Date.now(), items };
}
let pendingDoneReport=null;
function openShareDone(){
  const code=makeDoneCode();
  if(!code){ toast("返す作業がありません"); return; }
  const doneN=code.items.filter(it=>it.done).length;
  pendingDoneReport=code;
  el("shareDoneInfo").textContent=`完了 ${doneN}件を含む報告です。「職長に送信する」を押すと、クラウド経由で職長に届きます。`;
  el("shareDoneModal").classList.add("active");
}
let doneReviewData=null;
let doneReviewCloudId=null;
let doneReviewSelected=[]; // 反映するかどうか（obj.items のインデックスに対応）
function openDoneReview(obj, cloudId){ doneReviewData=obj; doneReviewCloudId=cloudId||null; doneReviewSelected=[]; renderDoneReview(); showView("doneReview"); }
function renderDoneReview(){
  const v=el("viewDoneReview");
  const obj=doneReviewData;
  let html=`<div class="detail-title-row"><div class="detail-title">完了報告の反映</div></div>`;
  if(!obj||!Array.isArray(obj.items)){ html+=`<div class="empty" style="margin-top:30px">データがありません。</div>`; v.innerHTML=html; return; }
  let willDone=0, skipped=0;
  const rows=obj.items.map((it,ix)=>{
    const loc=db.locations.find(l=>l.id===it.lid);
    const p=loc?procListFor(loc).find(pp=>pp.id===it.pid):null;
    const found=!!(loc&&p);
    const apply=found && it.done && getProg(loc,it.pid).status!=="done";
    if(doneReviewSelected[ix]===undefined) doneReviewSelected[ix]=found; // 初期値：見つかった項目は反映する
    if(!found) skipped++; else if(it.done && apply && doneReviewSelected[ix]) willDone++;
    return {it,ix,loc,p,found,apply};
  });
  const w=new Date(obj.at||Date.now());
  const wt=`${w.getFullYear()}/${w.getMonth()+1}/${w.getDate()} ${String(w.getHours()).padStart(2,"0")}:${String(w.getMinutes()).padStart(2,"0")}`;
  html+=`<div class="detail-sub">${escapeHtml(obj.site||"現場")}　受信：${wt}</div>`;
  html+=`<div class="preview">完了にする工程 ${willDone}件　／　対象外 ${skipped}件</div>`;
  html+=`<div class="preview" style="background:#fff7e6;color:#92500a">チェックを外した工程は本体に反映されません（対象外は元から反映されません）</div>`;
  const groups={}, order=[];
  rows.forEach(r=>{ const f=r.it.fl||"その他"; if(!groups[f]){groups[f]=[];order.push(f);} groups[f].push(r); });
  order.forEach(f=>{
    html+=`<div class="floor-head">${escapeHtml(f)}</div>`;
    const byRoom={}, ro=[];
    groups[f].forEach(r=>{ const k=r.it.lid; if(!byRoom[k]){byRoom[k]=[];ro.push(k);} byRoom[k].push(r); });
    ro.forEach(rk=>{
      html+=`<div class="card"><div style="padding:12px">`;
      html+=`<div style="font-weight:700;margin-bottom:8px">${escapeHtml(byRoom[rk][0].it.ln)}</div>`;
      byRoom[rk].forEach(r=>{
        let tag;
        if(!r.found) tag=`<span class="due-badge b-todo">対象外</span>`;
        else if(r.it.done && r.apply) tag=`<span class="due-badge b-done">完了にする</span>`;
        else if(r.it.done && !r.apply) tag=`<span class="due-badge b-done">既に完了</span>`;
        else tag=`<span class="due-badge b-doing">未完了のまま</span>`;
        const sel=r.found && doneReviewSelected[r.ix];
        const dim=r.found && !doneReviewSelected[r.ix];
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;${dim?"opacity:.45":""}"><span style="flex:1">${escapeHtml(r.it.pn)}</span>${tag}</div>`;
        if(r.found){
          html+=`<label style="display:flex;align-items:center;gap:6px;padding:2px 0 6px;font-size:13px;color:var(--ink-soft)"><input type="checkbox" class="dr-apply-cb" data-ix="${r.ix}" ${sel?"checked":""}> この工程の内容を本体に反映する</label>`;
        }
        if(r.it.rem && r.it.rem.length){
          html+=`<div style="margin:0 0 8px 4px;border-left:2px solid var(--line);padding-left:10px;${dim?"opacity:.45":""}">`;
          r.it.rem.forEach(rm=>{
            const mark=rm.d?`<span style="color:#1a9c4a;font-weight:700">✓</span>`:`<span style="color:#c7c7c7">○</span>`;
            const txtStyle=rm.d?"text-decoration:line-through;color:var(--ink-soft);opacity:.6":"color:var(--ink)";
            html+=`<div style="display:flex;align-items:center;gap:7px;padding:3px 0;font-size:13px"><span style="flex:0 0 auto">${mark}</span><span style="flex:1;${txtStyle}">${escapeHtml(rm.t)}</span></div>`;
          });
          html+=`</div>`;
        }
      });
      html+=`</div></div>`;
    });
  });
  html+=`<button class="btn btn-primary" id="doneApplyBtn" style="margin-top:14px">本体に反映する（${willDone}件を完了）</button>`;
  html+=`<button class="btn btn-soft" id="doneCancelBtn" style="margin-top:8px">やめる</button>`;
  if(doneReviewCloudId) html+=`<button class="btn-danger-text" id="doneDeleteBtn" style="margin-top:4px">この完了報告を削除</button>`;
  v.innerHTML=html;
  v.querySelectorAll(".dr-apply-cb").forEach(cb=>cb.addEventListener("change",()=>{
    const ix=parseInt(cb.dataset.ix,10);
    doneReviewSelected[ix]=cb.checked;
    renderDoneReview();
  }));
  el("doneApplyBtn").addEventListener("click",()=>{
    uiConfirm(`${willDone}件を完了にして本体に反映します。よろしいですか？`,{okText:"反映する",okStyle:"primary"}).then(ok=>{ if(ok) applyDoneReview(obj); });
  });
  el("doneCancelBtn").addEventListener("click",()=>{
    if(doneReviewCloudId){ doneReviewCloudId=null; openReportList(); }
    else { showView("list"); renderList(); }
  });
  const delBtn=el("doneDeleteBtn");
  if(delBtn) delBtn.addEventListener("click", async ()=>{
    const ok=await uiConfirm("この完了報告を削除しますか？（本体には反映されません）",{okText:"削除する",okStyle:"danger"});
    if(!ok) return;
    if(!window.__fbDeleteReport){ toast("クラウド機能が使えません"); return; }
    const id=doneReviewCloudId;
    try{
      await window.__fbDeleteReport(id);
      doneReviewCloudId=null;
      toast("報告を削除しました");
      openReportList();
    }catch(e){
      toast("削除に失敗しました。通信状態をご確認ください");
    }
  });
}
function applyDoneReview(obj){
  let appliedDone=0, skipped=0;
  obj.items.forEach((it,ix)=>{
    const loc=db.locations.find(l=>l.id===it.lid);
    const p=loc?procListFor(loc).find(pp=>pp.id===it.pid):null;
    if(!loc||!p){ skipped++; return; }
    if(!doneReviewSelected[ix]){ skipped++; return; } // 反映しないを選択した工程
    let touched=false;
    if(Array.isArray(it.rem)&&it.rem.length){
      const cur=(getProg(loc,p.id).remaining||[]).slice();
      let changed=false;
      it.rem.forEach((r,ix)=>{ if(cur[ix]&&cur[ix].text===r.t&&cur[ix].done!==!!r.d){ cur[ix]={text:cur[ix].text,done:!!r.d}; changed=true; } });
      if(changed){ setProg(loc,p.id,{remaining:cur}); touched=true; }
    }
    if(it.done && getProg(loc,p.id).status!=="done"){ setProg(loc,p.id,{status:"done"}); appliedDone++; touched=true; }
    if(touched) loc.updatedAt=Date.now();
  });
  save();
  const cloudId=doneReviewCloudId; doneReviewCloudId=null;
  if(cloudId && window.__fbDeleteReport){
    window.__fbDeleteReport(cloudId).catch(()=>{ toast("反映しましたが、クラウド上の報告の削除に失敗しました"); });
  }
  showView("list"); renderList();
  toast(`${appliedDone}件を完了に反映しました${skipped?`（対象外 ${skipped}件）`:""}`);
}

  const btn=el("shareDoneSendBtn");
  btn.disabled=true; btn.textContent="送信中…";
  try{
    await window.__fbSubmitReport(pendingDoneReport);
    el("shareDoneModal").classList.remove("active");
    toast("職長に送信しました");
  }catch(e){
    toast("送信に失敗しました。通信状態をご確認のうえ、もう一度お試しください");
  }finally{
    btn.disabled=false; btn.textContent="📤 職長に送信する";
  }
});

/* 起動 */
load(); applyMode();
</script>

<!-- ===== Firebase 連携（ステップ2：保存・読み込みをクラウド化） ===== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  // 認証まわりの準備が全て整うまでの一時スイッチ。
  // true にすると「入口画面（ログイン／作業員参加）」がアプリの手前に出るようになる。
  // 今回はまだログイン処理そのものを作っていないため false（今まで通りアプリが開ける）。
  const AUTH_GATE_ENABLED = false;

  const firebaseConfig = {
    apiKey: "AIzaSyAtueupYX9AGEsHcSSy8gulMBJxhsvCU0c",
    authDomain: "genbakanri-d811d.firebaseapp.com",
    projectId: "genbakanri-d811d",
    storageBucket: "genbakanri-d811d.firebasestorage.app",
    messagingSenderId: "529760966640",
    appId: "1:529760966640:web:c4741dd61a8e8e1889af35"
  };

  const fbApp = initializeApp(firebaseConfig);
  const fbDb = getFirestore(fbApp);
  const fbAuth = getAuth(fbApp);
  const mainRef = doc(fbDb, "genba", "main");
  const reportsCol = collection(fbDb, "reports");
  const taskListsCol = collection(fbDb, "tasklists");

  // ログイン状態に応じて「入口画面」か「通常のアプリ画面」かを出し分け
  // （AUTH_GATE_ENABLED が false の間は常に通常画面のまま＝今まで通りの動作）
  onAuthStateChanged(fbAuth, (user) => {
    if(!AUTH_GATE_ENABLED) return;
    const gate = document.getElementById("authGate");
    if(!gate) return;
    gate.classList.toggle("active", !user);
  });

  // 本体側（下の通常script）から呼び出せるように window に公開
  window.__fbPull = async function(){
    const snap = await getDoc(mainRef);
    return snap.exists() ? (snap.data().db || null) : null;
  };
  window.__fbPush = async function(dbObj){
    await setDoc(mainRef, { db: dbObj, updatedAt: Date.now() });
  };

  // 完了報告（作業員→職長）：reports コレクションに1件ずつ追加／一覧取得／反映後の削除
  window.__fbSubmitReport = async function(reportObj){
    await addDoc(reportsCol, reportObj);
  };
  window.__fbListReports = async function(){
    const snap = await getDocs(reportsCol);
    const out = [];
    snap.forEach(d => out.push(Object.assign({ id: d.id }, d.data())));
    return out;
  };
  window.__fbDeleteReport = async function(reportId){
    await deleteDoc(doc(fbDb, "reports", reportId));
  };

  // 作業リスト（職長→作業員）：tasklists コレクションに1件ずつ追加／一覧取得（複数保持）
  window.__fbSubmitTaskList = async function(listObj){
    await addDoc(taskListsCol, listObj);
  };
  window.__fbListTaskLists = async function(){
    const snap = await getDocs(taskListsCol);
    const out = [];
    snap.forEach(d => out.push(Object.assign({ id: d.id }, d.data())));
    return out;
  };

  // 起動時：画面はまずローカルデータで即表示済み。ここでクラウドの最新を取得できたら上書きする
  (async () => {
    try{
      const remote = await window.__fbPull();
      if(remote && typeof window.applyRemoteDb === "function"){
        window.applyRemoteDb(remote);
      }
    }catch(e){
      if(typeof window.toast === "function") window.toast("オフラインのため手元のデータを表示中");
      console.error(e);
    }
  })();
</script>
